name: verify domains

on:
  workflow_dispatch:
  push:
    paths:
      - 'Domain.xlsx'
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn -B -q clean package

      - name: Run domain classifier
        run: java -jar target/email-verifier.jar

      - name: Commit outputs
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Domain.xlsx Domain.csv Domain.pdf 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: classify domains [skip ci]"
            git push
          fi
