name: Run Email Verifier

on:
  workflow_dispatch:        # allows manual trigger from the Actions tab
  push:
    paths:
      - 'Domain.xlsx'       # re-run whenever the input file changes
      - 'src/**'
      - 'pom.xml'
  schedule:
    - cron: '0 6 * * *'     # optional: daily at 06:00 UTC. Delete this block if not needed.

permissions:
  contents: write           # needed so the workflow can commit the updated xlsx back

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # Chrome is pre-installed on ubuntu-latest runners, but we install it
      # explicitly to guarantee a known-good version + matching chromedriver
      # is on PATH (Selenium Manager will resolve the driver automatically).
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Build with Maven
        run: mvn -B clean package

      - name: Run Selenium job
        run: java -jar target/email-verifier.jar

      - name: Commit updated Domain.xlsx
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Domain.xlsx
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Domain.xlsx with verification results [skip ci]"
            git push
          fi
