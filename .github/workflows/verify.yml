name: verify emails

on:
  workflow_dispatch:
  push:
    paths:
      - 'Domain.xlsx'
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Xvfb (virtual display)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build with Maven
        run: mvn -B clean package

      # HEADLESS is intentionally NOT set, so Chrome runs in normal mode.
      # xvfb-run gives Chrome a fake display to render into.
      - name: Run Selenium job under Xvfb (non-headless)
        run: xvfb-run --server-args="-screen 0 1920x1080x24" java -jar target/email-verifier.jar

      - name: Commit results and debug captures
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f Domain.xlsx debug/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: update results + debug captures (non-headless test) [skip ci]"
            git push
          fi
