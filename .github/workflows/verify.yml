name: verify emails

on:
  workflow_dispatch:
  push:
    paths:
      - 'Domain.xlsx'
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Build with Maven
        run: mvn -B clean package

      - name: Run Selenium job
        env:
          HEADLESS: "true"
        run: java -jar target/email-verifier.jar

      # Always run this step, even if the Selenium job failed,
      # so we still commit the debug screenshots
      - name: Commit results and debug captures
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-add debug folder even if .gitignore excludes it
          git add -f Domain.xlsx debug/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: update results + debug captures [skip ci]"
            git push
          fi
